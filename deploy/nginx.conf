# 自签名证书生成命令（在服务器上执行一次）：
# mkdir -p /etc/nginx/ssl
# openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#   -keyout /etc/nginx/ssl/nginx-selfsigned.key \
#   -out /etc/nginx/ssl/nginx-selfsigned.crt \
#   -subj "/C=CN/ST=State/L=City/O=Organization/CN=localhost"
# 注意：自签名证书会被浏览器标记为"不安全"，这是正常现象。
# 生产环境建议使用 Let's Encrypt 等受信任机构签发的证书。

server {
    listen 80;
    server_name _;

    # 将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;  # 替换为你的域名或服务器 IP

    # SSL 自签名证书路径
    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 前端静态资源
    root /var/www/webui/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass https://192.168.3.203:8443/;  # 替换为你的后端地址
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 如果后端使用自签名证书，需要关闭 SSL 验证（仅内网/测试环境）
        # proxy_ssl_verify off;
        # proxy_ssl_server_name off;
    }

    # ttyd WebSocket 代理
    location /ttyd/ {
        proxy_pass http://192.168.3.203:7681/;  # 替换为你的 ttyd 地址
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Vue Router History 模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }
}
