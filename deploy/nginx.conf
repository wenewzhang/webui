# Self-signed certificate generation command (run once on the server):
# mkdir -p /etc/nginx/ssl
# openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#   -keyout /etc/nginx/ssl/nginx-selfsigned.key \
#   -out /etc/nginx/ssl/nginx-selfsigned.crt \
#   -subj "/C=CN/ST=State/L=City/O=Organization/CN=localhost"
# Note: Self-signed certificates will be marked as "Not Secure" by browsers, which is normal.
# For production environments, it is recommended to use certificates issued by trusted authorities such as Let's Encrypt.

server {
    listen 80;
    server_name _;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;  # Replace with your domain name or server IP

    # SSL self-signed certificate paths
    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    # SSL security configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security response headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend static assets
    root /var/www/webui/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy to backend
    location /api/ {
        proxy_pass https://127.0.0.1:8443/;  # Replace with your backend address
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # If the backend uses a self-signed certificate, disable SSL verification (internal network/test environments only)
        # proxy_ssl_verify off;
        # proxy_ssl_server_name off;
    }

    # ttyd WebSocket proxy
    location /ttyd/ {
        proxy_pass http://127.0.0.1:7681/;  # Replace with your ttyd address
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Vue Router History mode support
    location / {
        try_files $uri $uri/ /index.html;
    }
}
